name: Generate and Publish Documentation

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      schema_name:
        description: 'Schema stem to process (leave empty for all schemas)'
        required: false
        type: choice
        options:
          - ''
          - 'Clinical_V4.2'
          - 'EOB_V6.0'
          - 'Formulary_V6.2'
          - 'Insurance_V4.1'
          - 'ProviderDirectory_V4.3'
          - 'Roster_V6.2'

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      RELEASE_TAG: ${{ github.event.release.tag_name || 'manual' }}
      SCHEMA_NAME: ${{ inputs.schema_name }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Generate Markdown from XSD
      run: |
        mkdir -p docs
        if [ -z "$SCHEMA_NAME" ]; then
          echo "Processing all schemas in schemas/"
          python tools/build_xsd_docs.py --release-tag $RELEASE_TAG
        else
          echo "Processing schema: $SCHEMA_NAME"
          python tools/xsd_to_md.py \
            schemas/${SCHEMA_NAME}.xsd \
            docs/${SCHEMA_NAME}_Guide.md \
            $RELEASE_TAG
        fi

    - name: Commit and push docs to repo
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"

        if [ "${{ github.event_name }}" = "release" ]; then
          BRANCH="main"
          git fetch origin main
          git checkout main
          git reset --hard origin/main
        else
          BRANCH="${{ github.ref_name }}"
          git fetch origin $BRANCH
          git checkout $BRANCH
          git reset --hard origin/$BRANCH
        fi

        # ONLY add docs Guide files
        git add docs/*_Guide.md

        STAGED_FILES=$(git diff --staged --name-only)
        if [ -z "$STAGED_FILES" ]; then
          echo "No changes to commit"
        else
          for file in $STAGED_FILES; do
            if [[ ! "$file" =~ ^docs/.*_Guide\.md$ ]]; then
              echo "ERROR: Attempted to commit file outside docs/ or not a Guide file: $file"
              git reset
              exit 1
            fi
          done

          COMMIT_MSG="Update release documentation from $RELEASE_TAG"
          if [ "$SCHEMA_NAME" != "" ]; then
            COMMIT_MSG="Update $SCHEMA_NAME release documentation from $RELEASE_TAG"
          fi
          git commit -m "$COMMIT_MSG"
          git push origin HEAD:$BRANCH
          echo "Successfully pushed documentation to $BRANCH branch"
        fi
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Upload Markdown to release
      if: github.event_name == 'release'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ github.event.release.tag_name }}
        files: docs/*.md
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
